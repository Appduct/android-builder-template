name: Build Android App

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build ID from Appduct'
        required: true
      project_name:
        description: 'App display name'
        required: true
      website_url:
        description: 'Website URL to wrap'
        required: true
      package_name:
        description: 'Android package name (e.g. com.appduct.myapp)'
        required: true
      platform:
        description: 'Target platform'
        required: true
        default: 'android'
      callback_url:
        description: 'Webhook callback URL'
        required: true
      app_icon_url:
        description: 'URL to app icon (optional)'
        required: false
      splash_bg_color:
        description: 'Splash screen background color'
        required: false
        default: '#6366F1'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout template
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Notify build started
        run: |
          curl -s -X POST "${{ inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -d '{
              "build_id": "${{ inputs.build_id }}",
              "status": "processing",
              "logs": "GitHub Actions build started on runner ${{ runner.os }}",
              "secret": "${{ secrets.BUILD_WEBHOOK_SECRET }}"
            }' || true

      - name: Generate Android project
        run: |
          mkdir -p build-output
          
          # Set variables
          APP_NAME="${{ inputs.project_name }}"
          PACKAGE_NAME="${{ inputs.package_name }}"
          WEBSITE_URL="${{ inputs.website_url }}"
          PACKAGE_PATH=$(echo "$PACKAGE_NAME" | tr '.' '/')
          
          # Copy template
          cp -r template/* build-output/
          
          # Replace placeholders in all files
          find build-output -type f \( -name "*.gradle" -o -name "*.xml" -o -name "*.kt" -o -name "*.properties" \) | while read file; do
            sed -i "s|%%APP_NAME%%|${APP_NAME}|g" "$file"
            sed -i "s|%%PACKAGE_NAME%%|${PACKAGE_NAME}|g" "$file"
            sed -i "s|%%WEBSITE_URL%%|${WEBSITE_URL}|g" "$file"
            sed -i "s|%%SPLASH_BG_COLOR%%|${{ inputs.splash_bg_color }}|g" "$file"
          done
          
          # Move source files to correct package directory
          mkdir -p "build-output/app/src/main/java/${PACKAGE_PATH}"
          mv build-output/app/src/main/java/MainActivity.kt "build-output/app/src/main/java/${PACKAGE_PATH}/MainActivity.kt"

      - name: Download app icon
        if: inputs.app_icon_url != ''
        run: |
          ICON_URL="${{ inputs.app_icon_url }}"
          mkdir -p build-output/app/src/main/res/mipmap-xxxhdpi
          mkdir -p build-output/app/src/main/res/mipmap-xxhdpi
          mkdir -p build-output/app/src/main/res/mipmap-xhdpi
          mkdir -p build-output/app/src/main/res/mipmap-hdpi
          mkdir -p build-output/app/src/main/res/mipmap-mdpi
          
          # Download and resize icon for each density
          curl -sL "$ICON_URL" -o /tmp/icon_original.png
          
          # Install imagemagick
          sudo apt-get install -y imagemagick > /dev/null 2>&1
          
          convert /tmp/icon_original.png -resize 192x192 build-output/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert /tmp/icon_original.png -resize 144x144 build-output/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert /tmp/icon_original.png -resize 96x96 build-output/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert /tmp/icon_original.png -resize 72x72 build-output/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert /tmp/icon_original.png -resize 48x48 build-output/app/src/main/res/mipmap-mdpi/ic_launcher.png
          
          # Copy as round icons too
          for dir in xxxhdpi xxhdpi xhdpi hdpi mdpi; do
            cp "build-output/app/src/main/res/mipmap-${dir}/ic_launcher.png" "build-output/app/src/main/res/mipmap-${dir}/ic_launcher_round.png"
          done

      - name: Setup signing
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > build-output/release.keystore
          
          cat >> build-output/local.properties << EOF
          storeFile=../release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Make gradlew executable
        run: chmod +x build-output/gradlew

      - name: Build APK & AAB
        working-directory: build-output
        run: |
          ./gradlew assembleRelease bundleRelease --no-daemon 2>&1 | tee build.log
          
      - name: Upload artifacts to Supabase Storage
        id: upload
        run: |
          BUILD_ID="${{ inputs.build_id }}"
          SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
          SERVICE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          
          # Find built files
          APK_FILE=$(find build-output/app/build/outputs/apk/release -name "*.apk" | head -1)
          AAB_FILE=$(find build-output/app/build/outputs/bundle/release -name "*.aab" | head -1)
          
          DOWNLOAD_URLS=""
          
          # Upload APK
          if [ -f "$APK_FILE" ]; then
            APK_PATH="builds/${BUILD_ID}/app-release.apk"
            curl -s -X POST "${SUPABASE_URL}/storage/v1/object/app-assets/${APK_PATH}" \
              -H "Authorization: Bearer ${SERVICE_KEY}" \
              -H "Content-Type: application/vnd.android.package-archive" \
              --data-binary @"$APK_FILE"
            DOWNLOAD_URLS="${SUPABASE_URL}/storage/v1/object/public/app-assets/${APK_PATH}"
            echo "apk_url=${DOWNLOAD_URLS}" >> $GITHUB_OUTPUT
          fi
          
          # Upload AAB
          if [ -f "$AAB_FILE" ]; then
            AAB_PATH="builds/${BUILD_ID}/app-release.aab"
            curl -s -X POST "${SUPABASE_URL}/storage/v1/object/app-assets/${AAB_PATH}" \
              -H "Authorization: Bearer ${SERVICE_KEY}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$AAB_FILE"
            AAB_URL="${SUPABASE_URL}/storage/v1/object/public/app-assets/${AAB_PATH}"
            echo "aab_url=${AAB_URL}" >> $GITHUB_OUTPUT
            
            # Use AAB as primary download
            DOWNLOAD_URLS="${AAB_URL}"
          fi
          
          echo "download_url=${DOWNLOAD_URLS}" >> $GITHUB_OUTPUT

      - name: Notify build completed
        if: success()
        run: |
          curl -s -X POST "${{ inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -d '{
              "build_id": "${{ inputs.build_id }}",
              "status": "completed",
              "download_url": "${{ steps.upload.outputs.download_url }}",
              "logs": "Build completed successfully. APK: ${{ steps.upload.outputs.apk_url || 'N/A' }}, AAB: ${{ steps.upload.outputs.aab_url || 'N/A' }}",
              "secret": "${{ secrets.BUILD_WEBHOOK_SECRET }}"
            }'

      - name: Notify build failed
        if: failure()
        run: |
          LOGS=$(tail -50 build-output/build.log 2>/dev/null | tr '\n' '\\n' | sed 's/"/\\"/g' || echo "No logs available")
          curl -s -X POST "${{ inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"build_id\": \"${{ inputs.build_id }}\",
              \"status\": \"failed\",
              \"logs\": \"Build failed. Last 50 lines: ${LOGS}\",
              \"secret\": \"${{ secrets.BUILD_WEBHOOK_SECRET }}\"
            }" || true

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ inputs.build_id }}
          path: |
            build-output/app/build/outputs/apk/release/*.apk
            build-output/app/build/outputs/bundle/release/*.aab
          retention-days: 30
