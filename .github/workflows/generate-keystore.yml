name: Generate Keystore

on: [workflow_dispatch]  # Run manually from Actions tab

jobs:
  generate-keystore:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore appduct-release.keystore \
            -alias appduct \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass yourpassword \
            -keypass yourpassword \
            -dname "CN=Your Name,OU=Engineering,O=Appduct,L=City,ST=State,C=US"
      
      - name: Upload Keystore
        uses: actions/upload-artifact@v4
        with:
          name: appduct-release-keystore
          path: appduct-release.keystore