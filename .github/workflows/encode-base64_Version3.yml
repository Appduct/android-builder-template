name: Encode to Base64

on: [workflow_dispatch]

jobs:
  encode-base64:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Encode Keystore to Base64
        run: |
          base64 -w 0 appduct-release.keystore > appduct-release.keystore.b64
          echo "Base64 encoded keystore:"
          cat appduct-release.keystore.b64
      
      - name: Upload Base64 File
        uses: actions/upload-artifact@v4
        with:
          name: appduct-release-keystore-b64
          path: appduct-release.keystore.b64
      
      - name: Display Base64 (for copying)
        run: cat appduct-release.keystore.b64
      - name: Output for Secret
        run: |
          echo "Copy this value and add it as a repository secret:"
          cat appduct-release.keystore.b64